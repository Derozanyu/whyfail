<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhyFail · Local diagnostics</title>
  <script>(()=>{const q=new URLSearchParams(location.search).get('theme');document.documentElement.dataset.theme=(q==='dark'||q==='light'?q:null)||localStorage.getItem('whyfail-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')})()</script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">W</span><div><strong>WhyFail</strong><small data-i18n="local">本地诊断台</small></div></div>
      <div class="privacy"><span></span><span data-i18n="private">数据保留在本机</span></div>
      <div class="history-head"><span data-i18n="history">诊断历史</span><button id="refresh" title="Refresh">↻</button></div>
      <nav id="run-list" class="run-list"></nav>
      <div class="sidebar-foot"><span id="run-count">0 runs</span><span>v0.5.0</span></div>
      <div class="design-credit">Light · Esther Design System<br>Dark · Ferrari DESIGN.md analysis</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="breadcrumbs"><span data-i18n="workspace">工作台</span><b>/</b><span id="crumb">—</span></div>
        <div class="controls">
          <button id="theme-toggle" class="theme-toggle" type="button"><span id="theme-icon">☾</span><span id="theme-label">深色</span></button>
          <select id="language" aria-label="Language"><option value="zh-CN">简体中文</option><option value="en">English</option></select>
          <button id="export" class="ghost" data-i18n="export">导出 Markdown</button>
        </div>
      </header>

      <section id="empty" class="empty">
        <div class="empty-icon">⌁</div><h1 data-i18n="emptyTitle">还没有诊断记录</h1>
        <p data-i18n="emptyText">运行一条命令，失败现场会安全地显示在这里。</p>
        <code>whyfail run -- python app.py</code>
      </section>

      <section id="report" class="report hidden">
        <div class="hero">
          <div class="hero-copy">
            <div class="eyebrow"><span id="status-dot"></span><span id="status"></span><span>·</span><span id="ecosystem"></span></div>
            <h1 id="command"></h1>
            <div class="meta"><span id="started"></span><span id="duration"></span><span id="exit-code"></span></div>
          </div>
          <div id="confidence-wrap" class="confidence"><div id="confidence"></div><small id="confidence-label">诊断置信度</small></div>
        </div>

        <div class="grid">
          <article class="card diagnosis-card">
            <div class="card-label"><span id="diagnosis-label" class="card-kicker">最可能原因</span></div>
            <h2 id="diagnosis-title"></h2>
            <p id="diagnosis-explanation"></p>
            <div class="source-line"><span data-i18n="source">诊断来源</span><code id="source"></code></div>
            <div id="provider-error" class="warning hidden"></div>
          </article>

          <article class="card environment-card">
            <div class="card-label"><span class="card-kicker" data-i18n="environment">执行环境</span></div>
            <dl><div><dt>OS</dt><dd id="platform"></dd></div><div><dt>Runtime</dt><dd id="runtime"></dd></div><div><dt data-i18n="projectType">项目类型</dt><dd id="project-type"></dd></div><div><dt>CWD</dt><dd id="cwd"></dd></div></dl>
          </article>

          <article class="card evidence-card">
            <div class="card-label"><span id="evidence-label" class="card-kicker">现场证据</span><span id="evidence-count" class="badge"></span></div>
            <div id="evidence" class="evidence-list"></div>
          </article>

          <article class="card suggestions-card">
            <div class="card-label"><span id="suggestions-label" class="card-kicker">建议排查步骤</span></div>
            <div id="suggestions"></div>
            <div class="divider"></div>
            <div class="verification-kicker" data-i18n="verification">验证状态</div>
            <div id="verification-panel" class="verification-panel" data-status="needs-confirmation">
              <span class="verification-mark" aria-hidden="true"></span>
              <div>
                <strong id="verification-title"></strong>
                <p id="verification-explanation"></p>
                <div id="unverified"></div>
                <div id="verification-command" class="verification-command hidden"><span id="verification-command-label"></span><code id="verification-command-code"></code></div>
              </div>
            </div>
          </article>

          <article id="checks-card" class="card checks-card hidden">
            <div class="card-label"><span class="card-kicker" data-i18n="checks">项目检查</span><span id="checks-count" class="badge"></span></div>
            <div id="checks" class="checks-list"></div>
          </article>

          <article id="sources-card" class="card sources-card hidden">
            <div class="card-label"><span class="card-kicker" data-i18n="relatedSource">相关源码</span><span id="sources-count" class="badge"></span></div>
            <p class="source-note" data-i18n="sourceNote">按照错误堆栈顺序排列，仅显示出错位置附近的代码。</p>
            <div id="sources" class="sources-list"></div>
          </article>

          <article class="card logs-card">
            <div class="log-head"><div class="card-label"><span class="card-kicker" data-i18n="rawLogs">原始日志</span></div><div class="tabs"><button class="tab active" data-stream="stderr">stderr</button><button class="tab" data-stream="stdout">stdout</button><button id="copy-log" class="tab" data-i18n="copy">复制</button></div></div>
            <pre id="logs"></pre>
          </article>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
